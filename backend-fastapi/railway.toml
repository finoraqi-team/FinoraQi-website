# railway.toml - Configuração do deploy no Railway

[build]
# Usa Dockerfile personalizado
builder = "DOCKERFILE"
dockerfilePath = "backend-fastapi/Dockerfile"

[deploy]
# Comando de inicialização do servidor
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2"

# Health check para verificar se o serviço está saudável
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Variáveis de ambiente padrão (podem ser sobrescritas no dashboard)
[deploy.envs]
PYTHON_VERSION = "3.11"
PORT = "8000"
ENV = "production"
CORS_ORIGINS = "[\"*\"]"  # Em produção, troque por seu domínio

# Recursos alocados (ajuste conforme necessidade)
[deploy.resources]
memory = "512Mi"
cpu = "0.5"